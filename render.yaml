services:
  # Web service — the main API + bot
  - type: web
    name: postly-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: postly-redis
          type: redis
          property: connectionString
      # Set these manually in Render dashboard after first deploy:
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: MASTODON_ACCESS_TOKEN
        sync: false
      - key: MASTODON_INSTANCE
        value: mastodon.social

  # PostgreSQL database
  databases:
    - name: postly-db
      plan: free

  # Redis instance
  - type: redis
    name: postly-redis
    plan: free
    maxmemoryPolicy: noeviction